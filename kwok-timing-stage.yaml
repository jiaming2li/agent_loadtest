# Kwok Stages for realistic control-plane load testing.
#
# Every pod lifecycle phase carries: delay + jitter + probabilistic failure (weight-based split).
# Covers pod startup (pod-ready), deletion (pod-delete), in-place update (pod-inplace-update).
#
# Usage:
#   kubectl apply -f test/loadtest/kwok-timing-stages.yaml
#
# Conventions:
#   - The sandbox container is named "sandbox" (selectors use select(.name == "sandbox")).
#   - Success/failure is split by [same name or same selector + weight]: weight 9 : 1 ≈ 10% failures.
#   - Failures pollute success rate / RPS -- when testing [capacity/throughput], set the failure
#     weight to 0 or remove the failure stage; keep failures only when testing [robustness/failure handling].
#
# IMPORTANT:
#   - pod-ready / pod-ready-fail override kwok's default pod-ready. podIP uses a static placeholder
#     (a sandbox counts as having an IP as long as PodIP != ""; kwok pods have no real network, so a
#     static value is enough). After apply, always verify the sandbox can become Ready (see "Verify" at
#     the end of this file).
#   - pod-delete-fail (stuck Terminating) is commented out by default: it makes those pods never
#     disappear, which stalls pause/delete. Usually not needed; enable only when testing "stuck deletion".

# ══════════════════════════════════════════════════════════════
# 1) POD start：pod-ready（success） + pod-ready-fail（fail)：ImagePullBackOff）
# ══════════════════════════════════════════════════════════════
---
apiVersion: kwok.x-k8s.io/v1alpha1
kind: Stage
metadata:
  name: pod-ready
spec:
  resourceRef:
    apiGroup: v1
    kind: Pod
  selector:
    matchExpressions:
      - key: '.metadata.deletionTimestamp'
        operator: DoesNotExist
      - key: '.status.phase'
        operator: In
        values: ["Pending"]                 # not started yet
      - key: '.spec.nodeName'
        operator: NotIn
        values: [""]                         # already scheduled to a node
        # Prevent rescuing an already-failed (ImagePullBackOff) pod back into success
      - key: '.status.containerStatuses.[] | select(.name == "sandbox") | .state.waiting.reason'
        operator: NotIn
        values: ["ImagePullBackOff"]
  delay: 
    durationFrom: # without durationFrom, calculate from stage engine first seeing pod and selector matching
      expressionFrom: '.metadata.creationTimestamp' # time when pod was written into etcd
    durationMilliseconds: 5000               # base 5s
    jitterDurationMilliseconds: 12000        # actual 5~12s random
  next:
    statusSubresource: status
    statusTemplate: |
      {{ $now := Now }}
      phase: Running
      hostIP: "10.0.0.1"
      podIP: "10.244.0.1"                    # static placeholder (sandbox only needs a non-empty IP)
      conditions:
      - { type: Initialized,   status: "True",  lastTransitionTime: {{ $now | Quote }} }
      - { type: Ready,         status: "True",  lastTransitionTime: {{ $now | Quote }} }
      - { type: ContainersReady, status: "True", lastTransitionTime: {{ $now | Quote }} }
      - { type: PodScheduled,  status: "True",  lastTransitionTime: {{ $now | Quote }} }
      containerStatuses:
      {{ range .spec.containers }}
      - name: {{ .name | Quote }}
        image: {{ .image | Quote }}
        imageID: {{ .image | Quote }}
        ready: true
        started: true
        restartCount: 0
        state: { running: { startedAt: {{ $now | Quote }} } }
      {{ end }}
  weight: 999                                  # if a pod is matched by more than one stage, the weight to use this stage
---
apiVersion: kwok.x-k8s.io/v1alpha1
kind: Stage
metadata:
  name: pod-ready-fail
spec:
  resourceRef:
    apiGroup: v1
    kind: Pod
  selector:
    matchExpressions:
      - key: '.metadata.deletionTimestamp'
        operator: DoesNotExist
      - key: '.status.phase'
        operator: In
        values: ["Pending"]
      - key: '.spec.nodeName'
        operator: NotIn
        values: [""]
      - key: '.status.containerStatuses.[] | select(.name == "sandbox") | .state.waiting.reason'
        operator: NotIn
        values: ["ImagePullBackOff"]         
  delay:
    durationMilliseconds: 5000
    jitterDurationMilliseconds: 12000
  next:
    statusSubresource: status
    statusTemplate: |
      {{ $now := Now }}
      phase: Pending
      conditions:
      - { type: Ready, status: "False", reason: "ContainersNotReady", lastTransitionTime: {{ $now | Quote }} }
      containerStatuses:
      {{ range .spec.containers }}
      - name: {{ .name | Quote }}
        image: {{ .image | Quote }}
        ready: false
        started: false
        restartCount: 0
        state:
          waiting:
            reason: "ImagePullBackOff"
            message: "simulated image pull failure"
      {{ end }}
  weight: 1                                  # ~0.1% starup failure

# ══════════════════════════════════════════════════════════════
# 2) POD delete：pod-delete（success，real grace)
# ══════════════════════════════════════════════════════════════
---
apiVersion: kwok.x-k8s.io/v1alpha1
kind: Stage
metadata:
  name: pod-delete
spec:
  resourceRef:
    apiGroup: v1
    kind: Pod
  selector:
    matchExpressions:
      - key: '.metadata.deletionTimestamp'
        operator: Exists                     # 正在删除
  delay:
    durationFrom:
      expressionFrom: '.metadata.deletionTimestamp'   # when apiserver receive deletion request
    durationMilliseconds: 5000               # +5s grace
    jitterDurationMilliseconds: 10000        # actual 5~10s random
  next:
    delete: true                             # remove pod
  weight: 0



# ══════════════════════════════════════════════════════════════
# 3) update：pod-inplace-update-complete（success） + fail（ImagePullBackOff）
# ══════════════════════════════════════════════════════════════
---
apiVersion: kwok.x-k8s.io/v1alpha1
kind: Stage
metadata:
  name: pod-inplace-update-complete
spec:
  resourceRef:
    apiGroup: v1
    kind: Pod
  selector:
    matchExpressions:
      - key: '.metadata.deletionTimestamp'
        operator: DoesNotExist
      - key: '.metadata.annotations["agents.kruise.io/inplace-update-state"]'
        operator: Exists                     # need update
      - key: '.status.containerStatuses.[] | select(.name == "sandbox") | .imageID'
        operator: NotIn
        values: ["kwok://inplace-updated"]   # has updated
      - key: '.status.containerStatuses.[] | select(.name == "sandbox") | .state.waiting.reason'
        operator: NotIn
        values: ["ImagePullBackOff"]         # failed
  delay:
    durationMilliseconds: 5000               
    jitterDurationMilliseconds: 12000
  next:
    statusSubresource: status
    statusTemplate: |
      {{ $now := Now }}
      containerStatuses:
      {{ range .spec.containers }}
      - name: {{ .name | Quote }}
        image: {{ .image | Quote }}
        imageID: "kwok://inplace-updated"    # imageID changes → signal of completion
        ready: true
        started: true
        restartCount: 1
        state: { running: { startedAt: {{ $now | Quote }} } }
      {{ end }}
  weight: 999                                  # ~99.9% success
---
apiVersion: kwok.x-k8s.io/v1alpha1
kind: Stage
metadata:
  name: pod-inplace-update-fail
spec:
  resourceRef:
    apiGroup: v1
    kind: Pod
  selector:
    matchExpressions:
      - key: '.metadata.deletionTimestamp'
        operator: DoesNotExist
      - key: '.metadata.annotations["agents.kruise.io/inplace-update-state"]'
        operator: Exists
      - key: '.status.containerStatuses.[] | select(.name == "sandbox") | .imageID'
        operator: NotIn
        values: ["kwok://inplace-updated"]
      - key: '.status.containerStatuses.[] | select(.name == "sandbox") | .state.waiting.reason'
        operator: NotIn
        values: ["ImagePullBackOff"]         
  delay:
    durationMilliseconds: 5000
    jitterDurationMilliseconds: 12000 
  next:
    statusSubresource: status
    statusTemplate: |
      {{ range .spec.containers }}
      - name: {{ .name | Quote }}
        image: {{ .image | Quote }}
        # ⚠️ no change of imageID → IsInplaceUpdateCompleted return uncompletion = update failure
        ready: false
        state:
          waiting:
            reason: "ImagePullBackOff"
            message: "simulated in-place update image pull failure"
      {{ end }}
  weight: 1                                  # ~0.1% fail



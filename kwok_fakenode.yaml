apiVersion: v1
kind: Node
metadata:
  name: kwok-node-0
  annotations:
    kwok.x-k8s.io/node: fake   # ← 告诉 KWOK 管理这个 Node
  labels:
    type: kwok                  # ← 用于 sandbox 调度到这些 Node
spec:
  providerID: "kwok://kwok-node-0"  # ← 重要！防止 Node 被意外删除
  taints:
  - effect: NoSchedule
    key: kwok.x-k8s.io/node
    value: fake                 # ← 防止真实 Pod 调度到假 Node
status:
  allocatable:
    cpu: 32
    memory: 256Gi
    pods: 110
